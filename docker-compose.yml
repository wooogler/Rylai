version: '3.8'

services:
  rylai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rylai-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/rylai.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_USE_LOCAL_API=${NEXT_PUBLIC_USE_LOCAL_API:-false}
    volumes:
      # Persist SQLite database
      - rylai-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  rylai-data:
    driver: local
