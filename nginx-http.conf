# RYLAI Nginx Configuration (HTTP Only - for testing before DNS/SSL setup)
# Place this file at: /etc/nginx/sites-available/rylai
# Then create symlink: sudo ln -s /etc/nginx/sites-available/rylai /etc/nginx/sites-enabled/

# HTTP server (temporary - use until DNS is configured)
server {
    listen 80;
    listen [::]:80;
    server_name rylai.cs.vt.edu 128.173.237.99 localhost;

    # Logging
    access_log /var/log/nginx/rylai-access.log;
    error_log /var/log/nginx/rylai-error.log;

    # Client settings
    client_max_body_size 10M;

    # ACME challenge for Let's Encrypt (when ready)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy settings for Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets with caching
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # Favicon and other static files
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
